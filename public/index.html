<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Season电竞陪玩俱乐部</title>

<style>
/* 原有样式保持不变 */
/* ===== 背景 ===== */
body {
    margin: 0;
    font-family: "Microsoft YaHei", Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* ===== 顶部导航 ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 60px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,255,255,0.3);
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #00ffff;
}

.nav-menu {
    display: flex;
    gap: 30px;
}

.nav-item {
    cursor: pointer;
    transition: 0.3s;
}

.nav-item:hover {
    color: #00ffff;
}

.login-btn {
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid #00ffff;
    background: transparent;
    color: white;
    cursor: pointer;
}

.login-btn:hover {
    background: #00ffff;
    color: black;
}

/* 新增个人中心按钮样式（与登录按钮一致） */
.user-center-btn {
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid #00ffff;
    background: transparent;
    color: white;
    cursor: pointer;
    display: none; /* 默认隐藏 */
}

.user-center-btn:hover {
    background: #00ffff;
    color: black;
}

/* ===== 主视觉 ===== */
.hero {
    text-align: center;
    padding-top: 90px;
}

.hero h1 {
    font-size: 64px;
    margin-bottom: 10px;
}

.hero span {
    color: #00ffff;
}

.hero p {
    font-size: 22px;
    color: #9ca3af;
}

.main-btn {
    margin-top: 40px;
    padding: 18px 55px;
    font-size: 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, #ff00cc, #00ffff);
    color: white;
    box-shadow: 0 0 20px rgba(0,255,255,0.7);
    transition: 0.3s;
}

.main-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(0,255,255,1);
}

/* ===== 在线陪玩 ===== */
.section-title {
    text-align: center;
    margin-top: 90px;
    font-size: 36px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.card {
    width: 250px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(0,255,255,0.6);
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

.name {
    margin-top: 10px;
    font-size: 20px;
}

.game {
    color: #9ca3af;
}

.status {
    margin-top: 6px;
    color: #00ff88;
}

.price {
    margin-top: 10px;
    font-size: 18px;
    color: #00ffff;
}

.order-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #ff0080;
    color: white;
}

.order-btn:hover {
    background: #ff3399;
}

/* ===== 底部 ===== */
footer {
    margin-top: 100px;
    padding: 25px;
    text-align: center;
    color: #9ca3af;
}
</style>
</head>
<body>
<!-- 顶部 -->
<div class="navbar">
    <div class="logo">🎮 Season俱乐部</div>
    <div class="nav-menu">
        <a class="nav-item" href="/">首页</a>
        <a class="nav-item" href="/list">热门陪玩</a>
        <a class="nav-item" href="/service">客服</a>
    </div>
    <!-- 登录按钮 -->
    <a class="login-btn" id="loginBtn" href="/login">登录</a>
    <!-- 个人中心按钮（默认隐藏） -->
    <a class="user-center-btn" id="userCenterBtn" href="/profile.html">个人中心</a>
</div>

<!-- 主视觉 -->
<div class="hero">
    <h1>找到你的 <span>专属陪玩</span></h1>
    <p>上分 · 陪聊 · 娱乐 · 开黑 · 24小时在线</p>
    <p>下单请联系客服</p>
    <button class="main-btn" onclick="goToList()">立即进入陪玩大厅</button>
</div>

<!-- 在线陪玩 -->
<div class="section-title">🔥 当前热门陪玩</div>
<div class="cards">
    <div class="card">
        <img class="avatar" src="images/xiaojiang.png">
        <div class="name">Season小蒋</div>
        <div class="game">无畏契约-赋能前100</div>
        <div class="status">● 在线</div>
        <div class="price">¥68 / 局</div>
        <button class="order-btn" onclick="goToList()">立即预约</button>
    </div>
    <div class="card">
        <img class="avatar" src="images/xiaoliu.png">
        <div class="name">Season小刘</div>
        <div class="game">无畏契约 · 神话3</div>
        <div class="status">● 在线</div>
        <div class="price">¥45 / 局</div>
        <button class="order-btn" onclick="goToList()">立即预约</button>
    </div>
    <div class="card">
        <img class="avatar" src="images/acheng.png">
        <div class="name">Season啊程</div>
        <div class="game">王者荣耀 · 野王</div>
        <div class="status">● 在线</div>
        <div class="price">¥9.9 / 局</div>
        <button class="order-btn" onclick="goToList()">立即预约</button>
    </div>
</div>

<footer>© 2026 Season电竞陪玩俱乐部 All Rights Reserved</footer>

<script>
function goToList() {
    window.location.href = "/list";
}

// 统一的登录状态检查方法（供全局调用）
window.checkLoginStatus = async function() {
    try {
        const res = await fetch('/api/checkLogin', {
            method: 'GET',
            credentials: 'include' // 携带cookie保持登录态
        });
        // 增加状态码判断，确保接口返回成功
        if (!res.ok) throw new Error('接口返回失败');
        const data = await res.json();
        if (data.isLogin) {
            // 登录后隐藏登录按钮，显示个人中心
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userCenterBtn').style.display = 'inline-block';
        } else {
            // 未登录显示登录按钮，隐藏个人中心
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('userCenterBtn').style.display = 'none';
        }
    } catch (e) {
        console.error('检查登录状态失败:', e);
        // 网络错误/接口错误时，优先读取本地临时标记（兜底）
        const isLogin = localStorage.getItem('isLogin') === 'true';
        if (isLogin) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userCenterBtn').style.display = 'inline-block';
        } else {
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('userCenterBtn').style.display = 'none';
        }
    }
}

// 页面加载+每次可见时都检查登录状态（解决切页后状态丢失）
window.onload = window.checkLoginStatus;
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) window.checkLoginStatus();
});

// 全局登录成功标记（供登录页调用）
window.loginSuccess = function() {
    localStorage.setItem('isLogin', 'true');
    window.checkLoginStatus();
};

// 全局退出成功标记（供个人中心调用）
window.logoutSuccess = function() {
    localStorage.removeItem('isLogin');
    window.checkLoginStatus();
};
</script>
</body>
</html>
