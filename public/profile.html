<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - Season俱乐部</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #12121a;
            color: #fff;
            min-height: 100vh;
            background-color: #12121a;
        }

        /* 顶部导航 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d3f;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #00e5ff;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-size: 14px;
        }

        .btn-back {
            background: transparent;
            color: #00e5ff;
            border: 1px solid #00e5ff;
        }

        .btn-logout {
            background: #ef4444;
            color: #fff;
        }

        .btn-back:hover {
            background: #00e5ff;
            color: #1a1a2e;
        }

        .btn-logout:hover {
            background: #dc2626;
        }

        /* 布局容器 */
        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 用户卡片 */
        .user-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2d2d3f;
            box-shadow: 0 0 20px rgba(126,34,206,0.2);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #7e22ce, #00e5ff, #ff006e);
        }

        .user-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar-wrapper {
            position: relative;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, #7e22ce, #00e5ff);
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: bold;
            overflow: hidden;
            cursor: pointer;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #7e22ce;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 12px;
            cursor: pointer;
        }

        .info-text {
            flex: 1;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .username {
            font-size: 18px;
            font-weight: bold;
        }

        .edit-name {
            font-size: 12px;
            color: #00e5ff;
            cursor: pointer;
        }

        .level {
            color: #9ca3af;
            font-size: 13px;
        }

        /* 余额卡片 */
        .balance-card {
            background: linear-gradient(135deg, #7e22ce, #a855f7);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(126,34,206,0.3);
        }

        .balance-title {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .balance-num {
            font-size: 32px;
            font-weight: bold;
        }

        .coin-unit {
            font-size: 16px;
            margin-left: 6px;
            opacity: 0.9;
        }

        .recharge-btn {
            margin-top: 12px;
            background: #fff;
            color: #7e22ce;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .recharge-btn:hover {
            transform: translateY(-2px);
        }

        /* 订单区域 */
        .order-box {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2d2d3f;
        }

        .order-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-empty {
            text-align: center;
            padding: 40px 0;
            color: #6b7280;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-item {
            background: #222233;
            padding: 16px;
            border-radius: 12px;
            border-left: 3px solid #00e5ff;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .order-label {
            color: #9ca3af;
            font-size: 13px;
        }

        .order-value {
            color: #fff;
            font-weight: bold;
        }

        .cost {
            color: #ff006e;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            place-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 350px;
            border: 1px solid #333355;
        }

        .modal-title {
            font-size: 18px;
            margin-bottom: 16px;
            color: #fff;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333355;
            background: #222233;
            color: #fff;
            margin-bottom: 16px;
            outline: none;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .modal-cancel {
            background: transparent;
            color: #9ca3af;
        }

        .modal-confirm {
            background: #7e22ce;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- 顶部导航 -->
    <div class="navbar">
        <div class="logo" onclick="location.href='/'">🎮 Season俱乐部</div>
        <div class="nav-btns">
            <button class="btn btn-back" onclick="location.href='/list'">返回陪玩大厅</button>
            <button class="btn btn-logout" onclick="logout()">安全退出</button>
        </div>
    </div>

    <div class="container">
        <!-- 用户信息卡片 -->
        <div class="user-card">
            <h2 class="user-title">👤 个人信息</h2>
            <div class="user-info">
                <div class="avatar-wrapper">
                    <div class="avatar" id="avatar" onclick="changeAvatar()">
                        <img id="avatarImg" src="https://picsum.photos/200/200?random=1" alt="头像">
                    </div>
                    <div class="avatar-edit" onclick="changeAvatar()">✏️</div>
                </div>
                <div class="info-text">
                    <div class="username-row">
                        <div class="username" id="username">加载中...</div>
                        <div class="edit-name" onclick="editUsername()">修改昵称</div>
                    </div>
                    <div class="level">正式会员 · 账号安全</div>
                </div>
            </div>

            <!-- 余额卡片 -->
            <div class="balance-card">
                <div class="balance-title">当前虚拟币余额</div>
                <div class="balance-num">
                    <span id="balance">0</span>
                    <span class="coin-unit">Season币</span>
                </div>
                <button class="recharge-btn" onclick="location.href='/recharge.html'">➕ 立即充值</button>
                <div style="font-size:12px; opacity:0.8; margin-top:8px;">1 RMB = 10 Season币</div>
            </div>
        </div>

        <!-- 订单记录 -->
        <div class="order-box">
            <h3 class="order-title">📋 我的订单记录</h3>
            <div class="order-list" id="orderList">
                <div class="order-empty">正在加载订单...</div>
            </div>
        </div>
    </div>

    <!-- 修改昵称弹窗 -->
    <div class="modal" id="nameModal">
        <div class="modal-content">
            <div class="modal-title">修改昵称</div>
            <input type="text" class="modal-input" id="newName" placeholder="请输入新昵称">
            <div class="modal-btns">
                <button class="modal-btn modal-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-confirm" onclick="saveUsername()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 模拟用户数据（实际从 /api/user 接口获取）
        let currentUser = {
            username: "用户" + Math.floor(Math.random() * 10000),
            avatar: "https://picsum.photos/200/200?random=" + Math.floor(Math.random() * 100),
            balance: 0
        };

        // 页面加载时获取用户信息
        async function loadUser() {
            try {
                const res = await fetch('/api/user', {
                    method: 'GET',
                    credentials: 'include'
                });
                // 修复点1：仅当状态码为401时跳转登录（排除其他状态码误判）
                if (res.status === 401) {
                    // 退出成功标记
                    if (window.logoutSuccess) window.logoutSuccess();
                    location.href = '/index.html';
                    return;
                }
                const data = await res.json();
                // 修复点2：校验username（匹配登录/注册的账号体系），而非phone
                if (!data || !data.username) {
                    if (window.logoutSuccess) window.logoutSuccess();
                    location.href = '/index.html';
                    return;
                }
                // 合并后端数据与本地用户信息
                currentUser = {
                    ...currentUser,
                    ...data,
                    username: data.username || currentUser.username
                };
                document.getElementById('username').innerText = currentUser.username;
                document.getElementById('balance').innerText = currentUser.balance || 0;
                document.getElementById('avatarImg').src = currentUser.avatar;
                loadOrders();
            } catch (e) {
                // 修复点3：增加错误提示，避免直接跳转（仅在明确未登录时跳转）
                console.error('获取用户信息失败:', e);
                // 仅当捕获到认证相关错误时跳转
                if (e.message.includes('401') || e.message.includes('Unauthorized')) {
                    alert('登录状态失效，请重新登录');
                    if (window.logoutSuccess) window.logoutSuccess();
                    location.href = '/index.html';
                } else {
                    alert('获取用户信息失败，请刷新页面重试');
                    // 加载本地模拟数据，避免页面无法使用
                    document.getElementById('username').innerText = currentUser.username;
                    document.getElementById('balance').innerText = currentUser.balance;
                    document.getElementById('avatarImg').src = currentUser.avatar;
                    loadOrders();
                }
            }
        }

        // 加载订单
        async function loadOrders() {
            try {
                const res = await fetch('/api/orders', {
                    method: 'GET',
                    credentials: 'include'
                });
                const list = await res.json();
                const box = document.getElementById('orderList');
                if (list.length === 0) {
                    box.innerHTML = '<div class="order-empty">暂无订单记录</div>';
                    return;
                }
                box.innerHTML = list.map(o => `
                    <div class="order-item">
                        <div class="order-row">
                            <span class="order-label">订单号</span>
                            <span class="order-value">${o.orderId || 'ORD' + Date.now()}</span>
                        </div>
                        <div class="order-row">
                            <span class="order-label">陪玩</span>
                            <span class="order-value">${o.player || '未知'}</span>
                        </div>
                        <div class="order-row">
                            <span class="order-label">消耗Season币</span>
                            <span class="order-value cost">${o.coin || 0}</span>
                        </div>
                        <div class="order-row">
                            <span class="order-label">时间</span>
                            <span class="order-value">${o.time || new Date().toLocaleString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('orderList').innerHTML = '<div class="order-empty">加载订单失败</div>';
            }
        }

        // 退出登录（修复核心逻辑）
        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                try {
                    // 调用退出接口
                    const res = await fetch('/logout', { 
                        method: 'GET', // 修正请求方法为GET（对应server.js的logout接口）
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    // 无论接口是否成功，都强制清除登录态并跳转（兜底逻辑）
                    if (res.ok) {
                        alert('退出登录成功！');
                    } else {
                        console.warn('退出接口返回异常，强制跳转首页');
                    }
                } catch (e) {
                    // 接口调用失败（如接口不存在），仍强制跳转
                    console.error('调用退出接口失败:', e);
                    alert('退出接口异常，已强制退出');
                } finally {
                    // 触发全局退出成功事件，更新所有页面的按钮状态
                    if (window.logoutSuccess) window.logoutSuccess();
                    // 最终强制跳转首页
                    location.href = '/index.html';
                }
            }
        }

        // 修改昵称弹窗
        function editUsername() {
            document.getElementById('nameModal').style.display = 'grid';
            document.getElementById('newName').value = currentUser.username;
        }

        function closeModal() {
            document.getElementById('nameModal').style.display = 'none';
        }

        async function saveUsername() {
            const newName = document.getElementById('newName').value.trim();
            if (!newName) {
                alert('昵称不能为空');
                return;
            }
            // 这里模拟保存到后端，实际需要调用接口更新用户名
            currentUser.username = newName;
            document.getElementById('username').innerText = newName;
            closeModal();
            alert('昵称修改成功！');
        }

        // 更换头像（随机图模拟）
        function changeAvatar() {
            const random = Math.floor(Math.random() * 100);
            const newAvatar = `https://picsum.photos/200/200?random=${random}`;
            currentUser.avatar = newAvatar;
            document.getElementById('avatarImg').src = newAvatar;
            alert('头像更换成功！');
        }

        window.onload = loadUser;
    </script>
</body>
</html>
